name: Docs Audit

on:
  push:
  pull_request:

jobs:
  docs-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug repository files
        run: |
          pwd
          git rev-parse HEAD
          ls -la
          find . -maxdepth 1 -iname '*agents*' -print

      - name: Run documentation audit
        run: python3 scripts/audit_docs.py
