<!DOCTYPE html>
<html lang="es">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Editar estancia</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            max-width: 700px;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 14px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            padding: 15px;
            font-size: 18px;
            width: 100%;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <h1>Editar estancia</h1>

    <form method="post" action="/actualizar-estancia/{{ estancia.id }}">
        <label>Nombre</label>
        <input name="nombre" value="{{ estancia.nombre }}" required>

        <label>Tipo de estancia</label>
        <input name="tipo_estancia" value="{{ estancia.tipo_estancia }}" required>

        <label>Planta</label>
        <input name="planta" value="{{ estancia.planta or '' }}">

        <label>Observaciones</label>
        <textarea name="observaciones" rows="5">{{ estancia.observaciones or '' }}</textarea>

        <button type="submit">Guardar cambios</button>
    </form>

    <br>
    <a href="/definir-estancias/{{ estancia.visita_id }}">Volver</a>
</body>

</html>
