<!DOCTYPE html>
<html lang="es">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nuevo expediente</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            max-width: 820px;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 12px;
            margin-bottom: 14px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            padding: 15px;
            font-size: 18px;
            width: 100%;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .boton-secundario {
            background: #f0f0f0;
            color: black;
            border: 1px solid #ccc;
        }

        .card {
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 18px;
            background: #fafafa;
        }

        .oculto {
            display: none;
        }

        .contenedor-direccion {
            position: relative;
        }

        .sugerencias {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ccc;
            border-radius: 8px;
            max-height: 220px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .sugerencia-item {
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }

        .sugerencia-item:last-child {
            border-bottom: none;
        }

        .sugerencia-item:hover {
            background: #f3f4f6;
        }

        .texto-ayuda {
            font-size: 14px;
            color: #666;
            margin-top: -8px;
            margin-bottom: 12px;
        }
    </style>
</head>

<body>
    <h1>Nuevo expediente</h1>

    <form method="post" action="/guardar-expediente">
        <div class="card">
            <h2>Datos generales</h2>

            <label>Número de expediente</label>
            <input name="numero_expediente" required>

            <label>Cliente</label>
            <input name="cliente" required>

            <label>Dirección</label>
            <div class="contenedor-direccion">
                <input name="direccion" id="direccion" autocomplete="off" required>
                <div id="sugerencias_direccion" class="sugerencias oculto"></div>
            </div>
            <div class="texto-ayuda">Escribe al menos 3 caracteres para ver sugerencias.</div>

            <button type="button" class="boton-secundario" onclick="autocompletarDireccion()">
                Autocompletar dirección
            </button>

            <label>Código postal</label>
            <input name="codigo_postal" id="codigo_postal">

            <label>Ciudad</label>
            <input name="ciudad" id="ciudad">

            <label>Provincia</label>
            <input name="provincia" id="provincia">

            <label>Tipo de inmueble</label>
            <select name="tipo_inmueble" id="tipo_inmueble" onchange="actualizarVisibilidadPiso()">
                <option value="">Seleccionar</option>
                <option value="Vivienda unifamiliar">Vivienda unifamiliar</option>
                <option value="Vivienda plurifamiliar">Vivienda plurifamiliar</option>
                <option value="Piso">Piso</option>
                <option value="Local comercial">Local comercial</option>
                <option value="Oficina">Oficina</option>
                <option value="Nave industrial">Nave industrial</option>
                <option value="Garaje">Garaje</option>
                <option value="Trastero">Trastero</option>
                <option value="Edificio completo">Edificio completo</option>
                <option value="Otro">Otro</option>
            </select>

            <label>Orientación del inmueble</label>
            <select name="orientacion_inmueble">
                <option value="">Seleccionar</option>
                <option value="Norte">Norte</option>
                <option value="Sur">Sur</option>
                <option value="Este">Este</option>
                <option value="Oeste">Oeste</option>
                <option value="Noreste">Noreste</option>
                <option value="Noroeste">Noroeste</option>
                <option value="Sureste">Sureste</option>
                <option value="Suroeste">Suroeste</option>
                <option value="Norte-Sur">Norte-Sur</option>
                <option value="Este-Oeste">Este-Oeste</option>
                <option value="Varias orientaciones">Varias orientaciones</option>
            </select>

            <label>Año de construcción</label>
            <input name="anio_construccion">

            <label>Plantas bajo rasante</label>
            <select name="plantas_bajo_rasante">
                <option value="0">0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
            </select>

            <label>Plantas sobre planta baja</label>
            <select name="plantas_sobre_baja">
                <option value="0">0 (solo PB)</option>
                <option value="1">1 (PB+1)</option>
                <option value="2">2 (PB+2)</option>
                <option value="3">3 (PB+3)</option>
                <option value="4">4 (PB+4)</option>
                <option value="5">5 (PB+5)</option>
                <option value="6">6 (PB+6)</option>
                <option value="7">7 (PB+7)</option>
                <option value="8">8 (PB+8)</option>
                <option value="9">9 (PB+9)</option>
                <option value="10">10 (PB+10)</option>
            </select>

            <label>Uso del inmueble</label>
            <input name="uso_inmueble">

            <label>Superficie aproximada</label>
            <input name="superficie">

            <label>Observaciones generales</label>
            <textarea name="observaciones_generales" rows="4"></textarea>
        </div>

        <div class="card oculto" id="bloque_piso_bloque">
            <h2>Características del bloque de viviendas</h2>

            <label>Observaciones del bloque</label>
            <textarea name="observaciones_bloque" rows="4"
                placeholder="Estado general, configuración del edificio, zonas comunes, fachadas, cubierta, etc."></textarea>
        </div>

        <div class="card oculto" id="bloque_piso_unidad">
            <h2>Características de la unidad</h2>

            <label>Planta de la unidad</label>
            <input name="planta_unidad" placeholder="Ej. PB, PB+1, ático...">

            <label>Puerta / unidad</label>
            <input name="puerta_unidad" placeholder="Ej. 2ºB, vivienda 3, puerta izquierda...">

            <label>Superficie de la unidad</label>
            <input name="superficie_unidad">

            <label>Número de dormitorios</label>
            <input name="dormitorios_unidad">

            <label>Número de baños</label>
            <input name="banos_unidad">

            <label>Observaciones de la unidad</label>
            <textarea name="observaciones_unidad" rows="4"></textarea>
        </div>

        <div class="card">
            <h2>Reforma</h2>

            <label>¿El inmueble ha sido reformado?</label>
            <select name="reformado" id="reformado" onchange="actualizarVisibilidadReforma()">
                <option value="No">No</option>
                <option value="Sí">Sí</option>
            </select>

            <div id="campos_reforma" class="oculto">
                <label>Fecha de la reforma</label>
                <input type="date" name="fecha_reforma">

                <label>Observaciones sobre la reforma</label>
                <textarea name="observaciones_reforma" rows="4"
                    placeholder="Indicar en qué ha consistido la reforma"></textarea>
            </div>
        </div>

        <button type="submit">Guardar expediente</button>
    </form>

    <br>
    <a href="/">Volver</a>

    <script>
        let temporizadorBusqueda = null;

        function actualizarVisibilidadPiso() {
            const tipo = document.getElementById("tipo_inmueble").value;
            const bloque1 = document.getElementById("bloque_piso_bloque");
            const bloque2 = document.getElementById("bloque_piso_unidad");

            if (tipo === "Piso") {
                bloque1.classList.remove("oculto");
                bloque2.classList.remove("oculto");
            } else {
                bloque1.classList.add("oculto");
                bloque2.classList.add("oculto");
            }
        }

        function actualizarVisibilidadReforma() {
            const reformado = document.getElementById("reformado").value;
            const bloque = document.getElementById("campos_reforma");

            if (reformado === "Sí") {
                bloque.classList.remove("oculto");
            } else {
                bloque.classList.add("oculto");
            }
        }

        function ocultarSugerencias() {
            const contenedor = document.getElementById("sugerencias_direccion");
            contenedor.innerHTML = "";
            contenedor.classList.add("oculto");
        }

        function aplicarSugerencia(item) {
            document.getElementById("direccion").value = item.direccion || "";
            document.getElementById("codigo_postal").value = item.codigo_postal || "";
            document.getElementById("ciudad").value = item.ciudad || "";
            document.getElementById("provincia").value = item.provincia || "";
            ocultarSugerencias();
        }

        function mostrarSugerencias(lista) {
            const contenedor = document.getElementById("sugerencias_direccion");
            contenedor.innerHTML = "";

            if (!lista || lista.length === 0) {
                ocultarSugerencias();
                return;
            }

            lista.forEach((item) => {
                const div = document.createElement("div");
                div.className = "sugerencia-item";
                div.textContent = item.direccion || "";
                div.onclick = function () {
                    aplicarSugerencia(item);
                };
                contenedor.appendChild(div);
            });

            contenedor.classList.remove("oculto");
        }

        async function buscarSugerenciasDireccion() {
            const direccion = document.getElementById("direccion").value.trim();

            if (direccion.length < 3) {
                ocultarSugerencias();
                return;
            }

            try {
                const respuesta = await fetch(
                    `/buscar-direcciones?q=${encodeURIComponent(direccion)}`,
                    {
                        method: "GET",
                        headers: {
                            "Accept": "application/json"
                        }
                    }
                );

                if (!respuesta.ok) {
                    ocultarSugerencias();
                    return;
                }

                const data = await respuesta.json();
                mostrarSugerencias(data);
            } catch (error) {
                console.error("Error buscando sugerencias:", error);
                ocultarSugerencias();
            }
        }

        async function autocompletarDireccion() {
            const direccionInput = document.getElementById("direccion");
            const codigoPostalInput = document.getElementById("codigo_postal");
            const ciudadInput = document.getElementById("ciudad");
            const provinciaInput = document.getElementById("provincia");

            const direccion = direccionInput.value.trim();

            if (!direccion) {
                alert("Introduce una dirección primero.");
                return;
            }

            try {
                const respuesta = await fetch(
                    `/autocompletar-direccion?direccion=${encodeURIComponent(direccion)}`,
                    {
                        method: "GET",
                        headers: {
                            "Accept": "application/json"
                        }
                    }
                );

                if (!respuesta.ok) {
                    const texto = await respuesta.text();
                    console.error("Respuesta no válida:", texto);
                    throw new Error(`HTTP ${respuesta.status}`);
                }

                const data = await respuesta.json();

                codigoPostalInput.value = data.codigo_postal || "";
                ciudadInput.value = data.ciudad || "";
                provinciaInput.value = data.provincia || "";

                if (!data.codigo_postal && !data.ciudad && !data.provincia) {
                    alert("No se han encontrado datos para esa dirección. Prueba con una dirección más completa.");
                }
            } catch (error) {
                console.error("Error en autocompletarDireccion:", error);
                alert("No se pudo autocompletar la dirección.");
            }
        }

        document.getElementById("direccion").addEventListener("input", function () {
            clearTimeout(temporizadorBusqueda);
            temporizadorBusqueda = setTimeout(buscarSugerenciasDireccion, 400);
        });

        document.addEventListener("click", function (event) {
            const direccionInput = document.getElementById("direccion");
            const sugerencias = document.getElementById("sugerencias_direccion");

            if (!direccionInput.contains(event.target) && !sugerencias.contains(event.target)) {
                ocultarSugerencias();
            }
        });

        actualizarVisibilidadPiso();
        actualizarVisibilidadReforma();
    </script>
</body>

</html>
