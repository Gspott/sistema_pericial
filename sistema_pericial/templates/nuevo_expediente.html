<!DOCTYPE html>
<html lang="es">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/mobile.css">
    <title>Nuevo expediente</title>
</head>

<body>
    <div class="page">
        <h1>Nuevo expediente</h1>

        <div class="card">
            <form method="post" action="/guardar-expediente">
                <label>Número expediente</label>
                <input name="numero_expediente" required>

                <label>Cliente</label>
                <input name="cliente" required>

                <label>Dirección</label>
                <input name="direccion" required>

                <label>Código postal</label>
                <input name="codigo_postal">

                <label>Ciudad</label>
                <input name="ciudad">

                <label>Provincia</label>
                <input name="provincia">

                <label>Tipo de inmueble</label>
                <select name="tipo_inmueble" id="tipo_inmueble">
                    <option value="">Seleccionar</option>
                    <option value="Vivienda unifamiliar">Vivienda unifamiliar</option>
                    <option value="Piso">Piso</option>
                    <option value="Local">Local</option>
                    <option value="Nave">Nave</option>
                </select>

                <label>Orientación</label>
                <input name="orientacion_inmueble">

                <label>Año construcción</label>
                <input name="anio_construccion">

                <label>Plantas bajo rasante</label>
                <input type="number" name="plantas_bajo_rasante" min="0" value="0">

                <label>Plantas sobre baja</label>
                <input type="number" name="plantas_sobre_baja" min="0" value="0">

                <label>Uso inmueble</label>
                <input name="uso_inmueble">

                <label>Superficie</label>
                <input name="superficie">

                <label>Observaciones generales</label>
                <textarea name="observaciones_generales"></textarea>

                <div id="bloque_piso" class="oculto">
                    <label>Planta de la unidad</label>
                    <input name="planta_unidad">

                    <label>Puerta / unidad</label>
                    <input name="puerta_unidad">

                    <label>Superficie de la unidad</label>
                    <input name="superficie_unidad">

                    <label>Dormitorios de la unidad</label>
                    <input name="dormitorios_unidad">

                    <label>Baños de la unidad</label>
                    <input name="banos_unidad">

                    <label>Observaciones del bloque</label>
                    <textarea name="observaciones_bloque"></textarea>

                    <label>Observaciones de la unidad</label>
                    <textarea name="observaciones_unidad"></textarea>
                </div>

                <label>¿Reformado?</label>
                <select name="reformado">
                    <option value="No" selected>No</option>
                    <option value="Sí">Sí</option>
                </select>

                <label>Fecha de reforma</label>
                <input type="date" name="fecha_reforma">

                <label>Observaciones de la reforma</label>
                <textarea name="observaciones_reforma"></textarea>

                <button type="submit">Crear expediente</button>
            </form>
        </div>

        <div class="actions">
            <a class="boton secundario" href="/">Volver</a>
        </div>
    </div>

    <script>
        const tipoInmueble = document.getElementById("tipo_inmueble");
        const bloquePiso = document.getElementById("bloque_piso");

        function actualizarBloquePiso() {
            if (tipoInmueble.value === "Piso") {
                bloquePiso.classList.remove("oculto");
            } else {
                bloquePiso.classList.add("oculto");
            }
        }

        tipoInmueble.addEventListener("change", actualizarBloquePiso);
        actualizarBloquePiso();
    </script>
</body>

</html>
