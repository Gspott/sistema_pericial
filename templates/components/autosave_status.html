<div id="{{ autosave_status_id }}"
     class="autosave-status ready"
     data-autosave-status-indicator
     data-autosave-state="ready"
     role="status"
     aria-live="polite">
    <span class="autosave-status-dot" aria-hidden="true"></span>
    <span data-autosave-status-label>{{ autosave_status_label or "Listo para editar" }}</span>
</div>
