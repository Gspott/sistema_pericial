<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="/static/mobile.css?v=8">
    <script src="/static/pwa.js?v=5" defer></script>

    <title>Crear usuario</title>
</head>

<body>
    <div class="page">
        <div class="card">
            <h1>Crear usuario</h1>
            <p class="subtitle">Registra un nuevo acceso al sistema.</p>

            {% if error %}
            <p class="error">{{ error }}</p>
            {% endif %}

            <form method="post" action="/crear-usuario">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" value="{{ form_data.nombre if form_data else '' }}"
                    required>

                <label for="apellido1">1 Apellido</label>
                <input type="text" id="apellido1" name="apellido1"
                    value="{{ form_data.apellido1 if form_data else '' }}" required>

                <label for="apellido2">2 Apellido</label>
                <input type="text" id="apellido2" name="apellido2"
                    value="{{ form_data.apellido2 if form_data else '' }}" required>

                <label for="telefono">Teléfono de contacto</label>
                <input type="text" id="telefono" name="telefono" value="{{ form_data.telefono if form_data else '' }}">

                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="{{ form_data.email if form_data else '' }}">

                <label for="titulacion">Titulación</label>
                <input type="text" id="titulacion" name="titulacion"
                    value="{{ form_data.titulacion if form_data else '' }}">

                <label for="numero_colegiado">Número de colegiado</label>
                <input type="text" id="numero_colegiado" name="numero_colegiado"
                    value="{{ form_data.numero_colegiado if form_data else '' }}">

                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" value="{{ form_data.username if form_data else '' }}"
                    required>

                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required>

                <label for="confirmar_password">Confirmar contraseña</label>
                <input type="password" id="confirmar_password" name="confirmar_password" required>

                <button class="boton" type="submit">Crear usuario</button>
            </form>

            <div class="actions" style="margin-top: 16px;">
                <a class="boton secundario" href="/login">Volver al acceso</a>
            </div>
        </div>
    </div>
</body>

</html>
