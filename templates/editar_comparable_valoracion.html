<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="/static/mobile.css?v=8">
    <script src="/static/pwa.js?v=5" defer></script>

    <title>Editar comparable</title>
</head>

<body>
    {% include "partials/_app_shell_start.html" %}
<div class="page"><h1>Editar comparable de valoración</h1>

        <div class="actions">
            <a class="boton secundario" href="/nueva-visita/{{ comparable.expediente_id }}?visita_id={{ comparable.visita_id }}">Volver a valoración</a>
        </div>

        <div class="card">
            <form method="post" action="/actualizar-comparable-valoracion/{{ comparable.id }}">
                {% for campo, etiqueta in comparables_valoracion_items %}
                <label for="{{ campo }}">{{ etiqueta }}</label>
                <textarea id="{{ campo }}" name="{{ campo }}">{{ comparable[campo] or '' }}</textarea>
                {% endfor %}

                <div class="actions">
                    <button class="boton" type="submit">Guardar cambios</button>
                </div>
            </form>
        </div>
    </div>
    {% include "partials/_app_shell_end.html" %}
</body>

</html>
