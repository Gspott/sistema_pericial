<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="/static/mobile.css?v=7">
    <script src="/static/pwa.js?v=4" defer></script>

    <title>Editar estancia</title>
</head>

<body>
    <div class="page with-top-nav">
        <div class="topbar">
            <p><strong>Usuario:</strong> {{ current_user.username }}</p>
            <a class="boton secundario" href="/logout">Cerrar sesión</a>
        </div>

        <h1>Editar estancia</h1>

        <div class="actions">
            <a class="boton secundario" href="/definir-estancias/{{ estancia.visita_id }}">Volver a estancias</a>
        </div>

        <div class="card">
            <form method="post" action="/actualizar-estancia/{{ estancia.id }}">
                <label for="nombre">Nombre de la estancia</label>
                <input type="text" id="nombre" name="nombre" value="{{ estancia.nombre }}" required>

                <label for="tipo_estancia">Tipo de estancia</label>
                <select id="tipo_estancia" name="tipo_estancia" required>
                    <option value="Salón" {% if estancia.tipo_estancia=="Salón" %}selected{% endif %}>Salón</option>
                    <option value="Comedor" {% if estancia.tipo_estancia=="Comedor" %}selected{% endif %}>Comedor</option>
                    <option value="Cocina" {% if estancia.tipo_estancia=="Cocina" %}selected{% endif %}>Cocina</option>
                    <option value="Dormitorio" {% if estancia.tipo_estancia=="Dormitorio" %}selected{% endif %}>Dormitorio</option>
                    <option value="Baño" {% if estancia.tipo_estancia=="Baño" %}selected{% endif %}>Baño</option>
                    <option value="Aseo" {% if estancia.tipo_estancia=="Aseo" %}selected{% endif %}>Aseo</option>
                    <option value="Pasillo" {% if estancia.tipo_estancia=="Pasillo" %}selected{% endif %}>Pasillo</option>
                    <option value="Recibidor" {% if estancia.tipo_estancia=="Recibidor" %}selected{% endif %}>Recibidor</option>
                    <option value="Terraza" {% if estancia.tipo_estancia=="Terraza" %}selected{% endif %}>Terraza</option>
                    <option value="Lavadero" {% if estancia.tipo_estancia=="Lavadero" %}selected{% endif %}>Lavadero</option>
                    <option value="Trastero" {% if estancia.tipo_estancia=="Trastero" %}selected{% endif %}>Trastero</option>
                    <option value="Garaje" {% if estancia.tipo_estancia=="Garaje" %}selected{% endif %}>Garaje</option>
                    <option value="Sótano" {% if estancia.tipo_estancia=="Sótano" %}selected{% endif %}>Sótano</option>
                    <option value="Buhardilla" {% if estancia.tipo_estancia=="Buhardilla" %}selected{% endif %}>Buhardilla</option>
                    <option value="Otro" {% if estancia.tipo_estancia=="Otro" %}selected{% endif %}>Otro</option>
                </select>

                <label for="ventilacion">Ventilación</label>
                <select id="ventilacion" name="ventilacion">
                    <option value="" {% if not estancia.ventilacion %}selected{% endif %}>Seleccionar...</option>
                    <option value="Sí" {% if estancia.ventilacion=="Sí" %}selected{% endif %}>Sí</option>
                    <option value="No" {% if estancia.ventilacion=="No" %}selected{% endif %}>No</option>
                </select>

                <label for="planta">Planta</label>
                <input type="text" id="planta" name="planta" value="{{ estancia.planta or '' }}">

                <fieldset class="field-group">
                    <legend>Acabados</legend>

                    <label for="acabado_pavimento">Pavimento</label>
                    <input type="text" id="acabado_pavimento" name="acabado_pavimento"
                        value="{{ estancia.acabado_pavimento or '' }}">

                    <label for="acabado_paramento">Paramento</label>
                    <input type="text" id="acabado_paramento" name="acabado_paramento"
                        value="{{ estancia.acabado_paramento or '' }}">

                    <label for="acabado_techo">Techo</label>
                    <input type="text" id="acabado_techo" name="acabado_techo"
                        value="{{ estancia.acabado_techo or '' }}">
                </fieldset>

                <label for="observaciones">Observaciones</label>
                <textarea id="observaciones" name="observaciones">{{ estancia.observaciones or '' }}</textarea>

                <label for="siguiente">Después de guardar</label>
                <select id="siguiente" name="siguiente">
                    <option value="estancias">Volver a estancias</option>
                    <option value="patologias">Ir a patologías</option>
                </select>

                <div class="actions">
                    <button class="boton" type="submit">Guardar cambios</button>
                </div>
            </form>
        </div>
    </div>

    <nav class="top-nav" aria-label="Navegación principal">
        <a class="top-nav-item" href="/">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 10.5 12 3l9 7.5"></path>
                <path d="M5 9.5V21h14V9.5"></path>
            </svg>
            <span class="top-nav-label">Inicio</span>
        </a>
        <a class="top-nav-item active" href="/expedientes">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 7.5A2.5 2.5 0 0 1 5.5 5H10l2 2h6.5A2.5 2.5 0 0 1 21 9.5v7A2.5 2.5 0 0 1 18.5 19h-13A2.5 2.5 0 0 1 3 16.5z"></path>
            </svg>
            <span class="top-nav-label">Expedientes</span>
        </a>
        <a class="top-nav-item center" href="/nuevo-expediente" aria-label="Nuevo expediente">
            <span class="top-nav-plus">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 5v14"></path>
                    <path d="M5 12h14"></path>
                </svg>
            </span>
            <span class="top-nav-label">Nuevo</span>
        </a>
        <a class="top-nav-item" href="/biblioteca-patologias">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5.5 4.5h10A2.5 2.5 0 0 1 18 7v12H7a2 2 0 0 0-2 2"></path>
                <path d="M5.5 4.5A2.5 2.5 0 0 0 3 7v12.5A1.5 1.5 0 0 0 4.5 21H18"></path>
            </svg>
            <span class="top-nav-label">Biblioteca</span>
        </a>
        <a class="top-nav-item" href="/logout">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M15.5 19a7.5 7.5 0 1 0-7 0"></path>
                <path d="M12 12a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"></path>
            </svg>
            <span class="top-nav-label">Perfil</span>
        </a>
    </nav>
</body>

</html>
