<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="/static/mobile.css?v=4">
    <script src="/static/pwa.js?v=4" defer></script>

    <title>Editar expediente</title>
</head>

<body>
    <div class="page">
        <h1>Editar expediente</h1>

        <div class="actions">
            <a class="boton secundario" href="/detalle-expediente/{{ expediente.id }}">Volver al expediente</a>
            <a class="boton secundario" href="/expedientes">Ver expedientes</a>
        </div>

        <div class="card">
            <form method="post" action="/actualizar-expediente/{{ expediente.id }}">
                <label for="numero_expediente">Número de expediente</label>
                <input type="text" id="numero_expediente" name="numero_expediente"
                    value="{{ expediente.numero_expediente }}" required>

                <label for="cliente">Cliente</label>
                <input type="text" id="cliente" name="cliente" value="{{ expediente.cliente }}" required>

                <label for="direccion">Dirección</label>
                <input type="text" id="direccion" name="direccion" value="{{ expediente.direccion }}" required>

                <label for="tipo_inmueble">Tipo de inmueble</label>
                <select id="tipo_inmueble" name="tipo_inmueble">
                    <option value="">Seleccionar...</option>
                    <option value="Vivienda unifamiliar" {% if expediente.tipo_inmueble=="Vivienda unifamiliar"
                        %}selected{% endif %}>Vivienda unifamiliar</option>
                    <option value="Piso" {% if expediente.tipo_inmueble=="Piso" %}selected{% endif %}>Piso</option>
                    <option value="Local" {% if expediente.tipo_inmueble=="Local" %}selected{% endif %}>Local</option>
                    <option value="Oficina" {% if expediente.tipo_inmueble=="Oficina" %}selected{% endif %}>Oficina
                    </option>
                    <option value="Nave" {% if expediente.tipo_inmueble=="Nave" %}selected{% endif %}>Nave</option>
                    <option value="Garaje" {% if expediente.tipo_inmueble=="Garaje" %}selected{% endif %}>Garaje
                    </option>
                    <option value="Trastero" {% if expediente.tipo_inmueble=="Trastero" %}selected{% endif %}>Trastero
                    </option>
                    <option value="Otro" {% if expediente.tipo_inmueble=="Otro" %}selected{% endif %}>Otro</option>
                </select>

                <label for="orientacion_inmueble">Orientación</label>
                <input type="text" id="orientacion_inmueble" name="orientacion_inmueble"
                    value="{{ expediente.orientacion_inmueble or '' }}">

                <label for="anio_construccion">Año de construcción</label>
                <input type="text" id="anio_construccion" name="anio_construccion"
                    value="{{ expediente.anio_construccion or '' }}">

                <label for="plantas_bajo_rasante">Plantas bajo rasante</label>
                <input type="number" id="plantas_bajo_rasante" name="plantas_bajo_rasante" min="0"
                    value="{{ expediente.plantas_bajo_rasante or '0' }}">

                <label for="plantas_sobre_baja">Plantas sobre baja</label>
                <input type="number" id="plantas_sobre_baja" name="plantas_sobre_baja" min="0"
                    value="{{ expediente.plantas_sobre_baja or '0' }}">

                <label for="uso_inmueble">Uso del inmueble</label>
                <input type="text" id="uso_inmueble" name="uso_inmueble" value="{{ expediente.uso_inmueble or '' }}">

                <label for="superficie">Superficie</label>
                <input type="text" id="superficie" name="superficie" value="{{ expediente.superficie or '' }}">

                <label for="observaciones_generales">Observaciones generales</label>
                <textarea id="observaciones_generales"
                    name="observaciones_generales">{{ expediente.observaciones_generales or '' }}</textarea>

                <div class="card" style="margin-top: 16px;">
                    <h2>Datos de piso / unidad</h2>

                    <label for="planta_unidad">Planta de la unidad</label>
                    <input type="text" id="planta_unidad" name="planta_unidad"
                        value="{{ expediente.planta_unidad or '' }}">

                    <label for="puerta_unidad">Puerta / unidad</label>
                    <input type="text" id="puerta_unidad" name="puerta_unidad"
                        value="{{ expediente.puerta_unidad or '' }}">

                    <label for="superficie_unidad">Superficie de la unidad</label>
                    <input type="text" id="superficie_unidad" name="superficie_unidad"
                        value="{{ expediente.superficie_unidad or '' }}">

                    <label for="dormitorios_unidad">Dormitorios</label>
                    <input type="text" id="dormitorios_unidad" name="dormitorios_unidad"
                        value="{{ expediente.dormitorios_unidad or '' }}">

                    <label for="banos_unidad">Baños</label>
                    <input type="text" id="banos_unidad" name="banos_unidad"
                        value="{{ expediente.banos_unidad or '' }}">

                    <label for="observaciones_bloque">Observaciones del bloque</label>
                    <textarea id="observaciones_bloque"
                        name="observaciones_bloque">{{ expediente.observaciones_bloque or '' }}</textarea>

                    <label for="observaciones_unidad">Observaciones de la unidad</label>
                    <textarea id="observaciones_unidad"
                        name="observaciones_unidad">{{ expediente.observaciones_unidad or '' }}</textarea>
                </div>

                <div class="card" style="margin-top: 16px;">
                    <h2>Reforma</h2>

                    <label for="reformado">¿Reformado?</label>
                    <select id="reformado" name="reformado">
                        <option value="No" {% if expediente.reformado=="No" or not expediente.reformado %}selected{%
                            endif %}>No</option>
                        <option value="Sí" {% if expediente.reformado=="Sí" %}selected{% endif %}>Sí</option>
                    </select>

                    <label for="fecha_reforma">Fecha de reforma</label>
                    <input type="text" id="fecha_reforma" name="fecha_reforma"
                        value="{{ expediente.fecha_reforma or '' }}">

                    <label for="observaciones_reforma">Observaciones de la reforma</label>
                    <textarea id="observaciones_reforma"
                        name="observaciones_reforma">{{ expediente.observaciones_reforma or '' }}</textarea>
                </div>

                <div class="actions">
                    <button class="boton" type="submit">Guardar cambios</button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
