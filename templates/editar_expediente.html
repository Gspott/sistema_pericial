<!DOCTYPE html>
<html lang="es">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/mobile.css">
    <title>Editar expediente</title>
</head>

<body>

    <div class="page">

        <h1>Editar expediente</h1>

        <div class="card">

            <form method="post">

                <label>Número expediente</label>
                <input name="numero_expediente" value="{{ expediente.numero_expediente }}">

                <label>Cliente</label>
                <input name="cliente" value="{{ expediente.cliente }}">

                <label>Dirección</label>
                <input name="direccion" value="{{ expediente.direccion }}">

                <label>Código postal</label>
                <input name="codigo_postal" value="{{ expediente.codigo_postal }}">

                <label>Ciudad</label>
                <input name="ciudad" value="{{ expediente.ciudad }}">

                <label>Tipo de inmueble</label>
                <input name="tipo_inmueble" value="{{ expediente.tipo_inmueble }}">

                <label>Orientación</label>
                <input name="orientacion_inmueble" value="{{ expediente.orientacion_inmueble }}">

                <label>Año construcción</label>
                <input name="anio_construccion" value="{{ expediente.anio_construccion }}">

                <label>Plantas</label>
                <input name="descripcion_plantas" value="{{ expediente.descripcion_plantas }}">

                <label>Superficie</label>
                <input name="superficie" value="{{ expediente.superficie }}">

                <label>Observaciones</label>
                <textarea name="observaciones_generales">{{ expediente.observaciones_generales }}</textarea>

                <button type="submit">Guardar cambios</button>

            </form>

        </div>

        <div class="actions">
            <a class="boton secundario" href="/detalle-expediente/{{ expediente.id }}">Cancelar</a>
        </div>

    </div>

</body>

</html>
