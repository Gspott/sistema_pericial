<!DOCTYPE html>
<html lang="es">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Editar expediente</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            max-width: 820px;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 12px;
            margin-bottom: 14px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            padding: 15px;
            font-size: 18px;
            width: 100%;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .boton-secundario {
            background: #f0f0f0;
            color: black;
            border: 1px solid #ccc;
        }

        .card {
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 18px;
            background: #fafafa;
        }

        .oculto {
            display: none;
        }

        /* NUEVO estilo sugerencias */

        .contenedor-direccion {
            position: relative;
        }

        .sugerencias {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ccc;
            border-radius: 8px;
            max-height: 220px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .sugerencia-item {
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }

        .sugerencia-item:hover {
            background: #f3f4f6;
        }
    </style>
</head>

<body>

    <h1>Editar expediente</h1>

    <form method="post" action="/actualizar-expediente/{{ expediente.id }}">

        <div class="card">

            <h2>Datos generales</h2>

            <label>Número de expediente</label>
            <input name="numero_expediente" value="{{ expediente.numero_expediente }}" required>

            <label>Cliente</label>
            <input name="cliente" value="{{ expediente.cliente }}" required>

            <label>Dirección</label>

            <div class="contenedor-direccion">
                <input name="direccion" id="direccion" value="{{ expediente.direccion }}" autocomplete="off" required>
                <div id="sugerencias_direccion" class="sugerencias oculto"></div>
            </div>

            <button type="button" class="boton-secundario" onclick="autocompletarDireccion()">
                Autocompletar dirección
            </button>

            <label>Código postal</label>
            <input name="codigo_postal" id="codigo_postal" value="{{ expediente.codigo_postal or '' }}">

            <label>Ciudad</label>
            <input name="ciudad" id="ciudad" value="{{ expediente.ciudad or '' }}">

            <label>Provincia</label>
            <input name="provincia" id="provincia" value="{{ expediente.provincia or '' }}">

            <label>Tipo de inmueble</label>

            <select name="tipo_inmueble" id="tipo_inmueble" onchange="actualizarVisibilidadPiso()">

                <option value="">Seleccionar</option>

                <option value="Vivienda unifamiliar" {% if expediente.tipo_inmueble=="Vivienda unifamiliar" %}selected{%
                    endif %}>Vivienda unifamiliar</option>

                <option value="Vivienda plurifamiliar" {% if expediente.tipo_inmueble=="Vivienda plurifamiliar"
                    %}selected{% endif %}>Vivienda plurifamiliar</option>

                <option value="Piso" {% if expediente.tipo_inmueble=="Piso" %}selected{% endif %}>Piso</option>

                <option value="Local comercial" {% if expediente.tipo_inmueble=="Local comercial" %}selected{% endif %}>
                    Local comercial</option>

                <option value="Oficina" {% if expediente.tipo_inmueble=="Oficina" %}selected{% endif %}>Oficina</option>

                <option value="Nave industrial" {% if expediente.tipo_inmueble=="Nave industrial" %}selected{% endif %}>
                    Nave industrial</option>

                <option value="Garaje" {% if expediente.tipo_inmueble=="Garaje" %}selected{% endif %}>Garaje</option>

                <option value="Trastero" {% if expediente.tipo_inmueble=="Trastero" %}selected{% endif %}>Trastero
                </option>

                <option value="Edificio completo" {% if expediente.tipo_inmueble=="Edificio completo" %}selected{% endif
                    %}>Edificio completo</option>

                <option value="Otro" {% if expediente.tipo_inmueble=="Otro" %}selected{% endif %}>Otro</option>

            </select>

            <label>Orientación del inmueble</label>

            <select name="orientacion_inmueble">

                <option value="">Seleccionar</option>

                {% for opcion in
                ["Norte","Sur","Este","Oeste","Noreste","Noroeste","Sureste","Suroeste","Norte-Sur","Este-Oeste","Varias
                orientaciones"] %}

                <option value="{{ opcion }}" {% if expediente.orientacion_inmueble==opcion %}selected{% endif %}>{{
                    opcion }}</option>

                {% endfor %}

            </select>

            <label>Año de construcción</label>
            <input name="anio_construccion" value="{{ expediente.anio_construccion or '' }}">

            <label>Plantas bajo rasante</label>

            <select name="plantas_bajo_rasante">
                {% for n in range(0,5) %}
                <option value="{{ n }}" {% if expediente.plantas_bajo_rasante==n|string %}selected{% endif %}>{{ n }}
                </option>
                {% endfor %}
            </select>

            <label>Plantas sobre planta baja</label>

            <select name="plantas_sobre_baja">
                {% for n in range(0,11) %}
                <option value="{{ n }}" {% if expediente.plantas_sobre_baja==n|string %}selected{% endif %}>
                    {% if n == 0 %}0 (solo PB){% else %}{{ n }} (PB+{{ n }}){% endif %}
                </option>
                {% endfor %}
            </select>

            <label>Uso del inmueble</label>
            <input name="uso_inmueble" value="{{ expediente.uso_inmueble or '' }}">

            <label>Superficie aproximada</label>
            <input name="superficie" value="{{ expediente.superficie or '' }}">

            <label>Observaciones generales</label>
            <textarea name="observaciones_generales" rows="4">{{ expediente.observaciones_generales or '' }}</textarea>

        </div>

        <button type="submit">Guardar cambios</button>

    </form>

    <br>

    <a href="/detalle-expediente/{{ expediente.id }}">Volver al expediente</a>

    <script>

        let temporizadorBusqueda = null

        function ocultarSugerencias() {
            const contenedor = document.getElementById("sugerencias_direccion")
            contenedor.innerHTML = ""
            contenedor.classList.add("oculto")
        }

        function aplicarSugerencia(item) {

            document.getElementById("direccion").value = item.direccion || ""
            document.getElementById("codigo_postal").value = item.codigo_postal || ""
            document.getElementById("ciudad").value = item.ciudad || ""
            document.getElementById("provincia").value = item.provincia || ""

            ocultarSugerencias()

        }

        function mostrarSugerencias(lista) {

            const contenedor = document.getElementById("sugerencias_direccion")
            contenedor.innerHTML = ""

            if (!lista || lista.length === 0) {
                ocultarSugerencias()
                return
            }

            lista.forEach((item) => {

                const div = document.createElement("div")
                div.className = "sugerencia-item"
                div.textContent = item.direccion

                div.onclick = function () {
                    aplicarSugerencia(item)
                }

                contenedor.appendChild(div)

            })

            contenedor.classList.remove("oculto")

        }

        async function buscarSugerenciasDireccion() {

            const direccion = document.getElementById("direccion").value.trim()

            if (direccion.length < 3) {
                ocultarSugerencias()
                return
            }

            try {

                const respuesta = await fetch(`/buscar-direcciones?q=${encodeURIComponent(direccion)}`)

                if (!respuesta.ok) {
                    ocultarSugerencias()
                    return
                }

                const data = await respuesta.json()

                mostrarSugerencias(data)

            } catch (error) {
                console.error(error)
                ocultarSugerencias()
            }

        }

        async function autocompletarDireccion() {

            const direccionInput = document.getElementById("direccion")
            const codigoPostalInput = document.getElementById("codigo_postal")
            const ciudadInput = document.getElementById("ciudad")
            const provinciaInput = document.getElementById("provincia")

            const direccion = direccionInput.value.trim()

            if (!direccion) {
                alert("Introduce una dirección primero.")
                return
            }

            try {

                const respuesta = await fetch(`/autocompletar-direccion?direccion=${encodeURIComponent(direccion)}`)

                if (!respuesta.ok) {
                    throw new Error("Error en la consulta")
                }

                const data = await respuesta.json()

                codigoPostalInput.value = data.codigo_postal || ""
                ciudadInput.value = data.ciudad || ""
                provinciaInput.value = data.provincia || ""

            } catch (error) {
                console.error(error)
                alert("No se pudo autocompletar la dirección.")
            }

        }

        document.getElementById("direccion").addEventListener("input", function () {

            clearTimeout(temporizadorBusqueda)

            temporizadorBusqueda = setTimeout(
                buscarSugerenciasDireccion,
                400
            )

        })

        document.addEventListener("click", function (event) {

            const direccionInput = document.getElementById("direccion")
            const sugerencias = document.getElementById("sugerencias_direccion")

            if (!direccionInput.contains(event.target) && !sugerencias.contains(event.target)) {
                ocultarSugerencias()
            }

        })

    </script>

</body>

</html>
