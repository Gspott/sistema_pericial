<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="/static/mobile.css?v=8">
    <script src="/static/pwa.js?v=5" defer></script>

    <title>Editar nivel</title>
</head>

<body>
    {% include "partials/_app_shell_start.html" %}
<div class="page"><h1>Editar nivel</h1>

        <div class="actions">
            <a class="boton secundario" href="/detalle-expediente/{{ nivel.expediente_id }}">Volver al expediente</a>
            <a class="boton secundario" href="/expedientes">Ver expedientes</a>
        </div>

        <div class="card">
            {% if error %}
            <p class="error">{{ error }}</p>
            {% endif %}

            <form method="post" action="/actualizar-nivel-expediente/{{ nivel.id }}">
                <label for="nombre_nivel">Nombre del nivel</label>
                <input id="nombre_nivel" name="nombre_nivel" type="text" value="{{ nivel.nombre_nivel or '' }}" required>

                <label for="orden_nivel">Orden</label>
                <input id="orden_nivel" name="orden_nivel" type="number" step="1" value="{{ nivel.orden_nivel if nivel.orden_nivel is not none else '' }}">

                <label for="tipo_nivel">Tipo de nivel</label>
                <select id="tipo_nivel" name="tipo_nivel">
                    <option value="">Selecciona una opción</option>
                    {% for valor, etiqueta in tipo_nivel_options %}
                    <option value="{{ valor }}" {% if nivel.tipo_nivel==valor %}selected{% endif %}>{{ etiqueta }}</option>
                    {% endfor %}
                </select>

                <label for="observaciones">Observaciones</label>
                <textarea id="observaciones" name="observaciones" rows="3">{{ nivel.observaciones or '' }}</textarea>

                <button class="boton" type="submit">Guardar cambios</button>
            </form>
        </div>
    </div>
    {% include "partials/_app_shell_end.html" %}
</body>

</html>
