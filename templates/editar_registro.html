<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/static/mobile.css?v=4">
    <script src="/static/pwa.js?v=4" defer></script>

    <title>Editar registro</title>
</head>

<body>
    <div class="page">
        <h1>Editar patología</h1>

        <div class="actions">
            <a class="boton secundario" href="/registrar-patologias/{{ registro.visita_id }}">Volver a patologías</a>
        </div>

        <div class="card">
            <form method="post" action="/actualizar-registro/{{ registro.id }}" enctype="multipart/form-data">
                <label for="estancia_id">Estancia</label>
                <select id="estancia_id" name="estancia_id" required>
                    {% for estancia in estancias %}
                    <option value="{{ estancia.id }}" {% if estancia.id==registro.estancia_id %}selected{% endif %}>
                        {{ estancia.nombre }}{% if estancia.planta %} ({{ estancia.planta }}){% endif %}
                    </option>
                    {% endfor %}
                </select>

                <label for="elemento">Elemento afectado</label>
                <input type="text" id="elemento" name="elemento" value="{{ registro.elemento }}" required>

                <label for="patologia">Patología</label>
                <input list="lista_patologias" id="patologia" name="patologia" value="{{ registro.patologia }}"
                    required>
                <datalist id="lista_patologias">
                    {% for item in patologias %}
                    <option value="{{ item.nombre }}">
                        {% endfor %}
                </datalist>

                <label for="observaciones">Observaciones</label>
                <textarea id="observaciones" name="observaciones">{{ registro.observaciones or '' }}</textarea>

                {% if registro.foto %}
                <div class="card" style="margin-top: 16px;">
                    <p><strong>Foto actual:</strong></p>
                    <img src="/uploads/{{ registro.foto }}" alt="Foto del registro">
                    <label for="eliminar_foto_actual">Eliminar foto actual</label>
                    <select id="eliminar_foto_actual" name="eliminar_foto_actual">
                        <option value="no" selected>No</option>
                        <option value="si">Sí</option>
                    </select>
                </div>
                {% else %}
                <input type="hidden" name="eliminar_foto_actual" value="no">
                {% endif %}

                <label for="foto">Nueva foto</label>
                <input type="file" id="foto" name="foto" accept="image/*">

                <div class="actions">
                    <button class="boton" type="submit">Guardar cambios</button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
