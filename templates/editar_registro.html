<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="/static/mobile.css?v=7">
    <script src="/static/pwa.js?v=4" defer></script>

    <title>Editar registro</title>
</head>

<body>
    <div class="page with-top-nav">
        <div class="topbar">
            <p><strong>Usuario:</strong> {{ current_user.username }}</p>
            <a class="boton secundario" href="/logout">Cerrar sesión</a>
        </div>

        <h1>Editar patología</h1>

        <div class="actions">
            <a class="boton secundario" href="/registrar-patologias/{{ registro.visita_id }}">Volver a patologías</a>
        </div>

        <div class="card">
            <form method="post" action="/actualizar-registro/{{ registro.id }}" enctype="multipart/form-data">
                <label for="estancia_id">Estancia</label>
                <select id="estancia_id" name="estancia_id" required>
                    {% for estancia in estancias %}
                    <option value="{{ estancia.id }}" {% if estancia.id==registro.estancia_id %}selected{% endif %}>
                        {{ estancia.nombre }}{% if estancia.planta %} ({{ estancia.planta }}){% endif %}
                    </option>
                    {% endfor %}
                </select>

                <label for="elemento">Elemento afectado</label>
                <select id="elemento" name="elemento" required>
                    {% if registro.elemento not in ['pavimento', 'paramento', 'techo'] %}
                    <option value="{{ registro.elemento }}" selected>{{ registro.elemento }}</option>
                    {% endif %}
                    <option value="pavimento" {% if registro.elemento=="pavimento" %}selected{% endif %}>pavimento</option>
                    <option value="paramento" {% if registro.elemento=="paramento" %}selected{% endif %}>paramento</option>
                    <option value="techo" {% if registro.elemento=="techo" %}selected{% endif %}>techo</option>
                </select>

                <label for="patologia">Patología</label>
                <select id="patologia" name="patologia" required>
                    <option value="{{ registro.patologia }}" selected>{{ registro.patologia }}</option>
                    {% for item in patologias %}
                    {% if item.nombre != registro.patologia %}
                    <option value="{{ item.nombre }}">{{ item.nombre }}</option>
                    {% endif %}
                    {% endfor %}
                </select>

                <label for="observaciones">Observaciones</label>
                <textarea id="observaciones" name="observaciones">{{ registro.observaciones or '' }}</textarea>

                {% if registro.foto %}
                <div class="card inner-card">
                    <p><strong>Foto actual:</strong></p>
                    <img src="/uploads/{{ registro.foto }}" alt="Foto del registro">
                    <label for="eliminar_foto_actual">Eliminar foto actual</label>
                    <select id="eliminar_foto_actual" name="eliminar_foto_actual">
                        <option value="no" selected>No</option>
                        <option value="si">Sí</option>
                    </select>
                </div>
                {% else %}
                <input type="hidden" name="eliminar_foto_actual" value="no">
                {% endif %}

                <label for="foto">Nueva foto</label>
                <input type="file" id="foto" name="foto" accept="image/*">

                <div class="actions">
                    <button class="boton" type="submit">Guardar cambios</button>
                </div>
            </form>
        </div>
    </div>

    <nav class="top-nav" aria-label="Navegación principal">
        <a class="top-nav-item" href="/">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 10.5 12 3l9 7.5"></path>
                <path d="M5 9.5V21h14V9.5"></path>
            </svg>
            <span class="top-nav-label">Inicio</span>
        </a>
        <a class="top-nav-item active" href="/expedientes">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 7.5A2.5 2.5 0 0 1 5.5 5H10l2 2h6.5A2.5 2.5 0 0 1 21 9.5v7A2.5 2.5 0 0 1 18.5 19h-13A2.5 2.5 0 0 1 3 16.5z"></path>
            </svg>
            <span class="top-nav-label">Expedientes</span>
        </a>
        <a class="top-nav-item center" href="/nuevo-expediente" aria-label="Nuevo expediente">
            <span class="top-nav-plus">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 5v14"></path>
                    <path d="M5 12h14"></path>
                </svg>
            </span>
            <span class="top-nav-label">Nuevo</span>
        </a>
        <a class="top-nav-item" href="/biblioteca-patologias">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5.5 4.5h10A2.5 2.5 0 0 1 18 7v12H7a2 2 0 0 0-2 2"></path>
                <path d="M5.5 4.5A2.5 2.5 0 0 0 3 7v12.5A1.5 1.5 0 0 0 4.5 21H18"></path>
            </svg>
            <span class="top-nav-label">Biblioteca</span>
        </a>
        <a class="top-nav-item" href="/logout">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M15.5 19a7.5 7.5 0 1 0-7 0"></path>
                <path d="M12 12a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"></path>
            </svg>
            <span class="top-nav-label">Perfil</span>
        </a>
    </nav>
</body>

</html>
