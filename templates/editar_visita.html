<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="/static/mobile.css?v=6">
    <script src="/static/pwa.js?v=4" defer></script>

    <title>Editar visita</title>
</head>

<body>
    <div class="page with-top-nav">
        <div class="topbar">
            <p><strong>Usuario:</strong> {{ current_user.username }}</p>
            <a class="boton secundario" href="/logout">Cerrar sesión</a>
        </div>

        <h1>Editar visita</h1>

        <div class="actions">
            <a class="boton secundario" href="/detalle-expediente/{{ visita.expediente_id }}">Volver al expediente</a>
            <a class="boton secundario" href="/definir-estancias/{{ visita.id }}">Ver estancias</a>
        </div>

        <div class="card">
            <p><strong>Expediente:</strong> {{ visita.numero_expediente }}</p>
            <p><strong>Dirección:</strong> {{ visita.direccion }}</p>
        </div>

        <div class="card">
            {% if error %}
            <p class="error">{{ error }}</p>
            {% endif %}
            <form method="post" action="/actualizar-visita/{{ visita.id }}">
                <label for="fecha">Fecha</label>
                <input type="date" id="fecha" name="fecha" value="{{ visita.fecha }}" required>

                <label for="tecnico">Técnico</label>
                <input type="text" id="tecnico" name="tecnico" value="{{ visita.tecnico }}" required>

                <h2>Ámbito de la visita</h2>
                <label for="ambito_visita">Ámbito</label>
                <select id="ambito_visita" name="ambito_visita">
                    {% for valor, etiqueta in ambito_visita_options %}
                    <option value="{{ valor }}" {% if (visita.ambito_visita or 'edificio_completo') == valor %}selected{% endif %}>{{ etiqueta }}</option>
                    {% endfor %}
                </select>

                <div id="bloque_nivel_visita" {% if visita.ambito_visita != 'nivel' %}hidden{% endif %}>
                    <label for="nivel_id_visita">Nivel / planta</label>
                    <select id="nivel_id_visita" name="nivel_id">
                        <option value="">Selecciona un nivel</option>
                        {% for nivel in niveles_visita_options %}
                        <option value="{{ nivel.id }}" {% if visita.nivel_id|string == nivel.id|string %}selected{% endif %}>{{ nivel.nombre_nivel }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div id="bloque_unidad_visita" {% if visita.ambito_visita != 'unidad' %}hidden{% endif %}>
                    <label for="unidad_id_visita">Unidad</label>
                    <select id="unidad_id_visita" name="unidad_id">
                        <option value="">Selecciona una unidad</option>
                        {% for unidad in unidades_visita_options %}
                        <option value="{{ unidad.id }}" {% if visita.unidad_id|string == unidad.id|string %}selected{% endif %}>{{ unidad.identificador }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div id="bloque_zona_comun_visita" {% if visita.ambito_visita != 'zona_comun' %}hidden{% endif %}>
                    <label for="unidad_id_zona_comun_visita">Zona común</label>
                    <select id="unidad_id_zona_comun_visita" name="unidad_id_zona_comun">
                        <option value="">Selecciona una zona común</option>
                        {% for unidad in zonas_comunes_visita_options %}
                        <option value="{{ unidad.id }}" {% if visita.unidad_id|string == unidad.id|string %}selected{% endif %}>{{ unidad.identificador }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div id="bloque_exterior_visita" {% if visita.ambito_visita != 'exterior' %}hidden{% endif %}>
                    <label for="unidad_id_exterior_visita">Exterior</label>
                    <select id="unidad_id_exterior_visita" name="unidad_id_exterior">
                        <option value="">Selecciona un exterior</option>
                        {% for unidad in exteriores_visita_options %}
                        <option value="{{ unidad.id }}" {% if visita.unidad_id|string == unidad.id|string %}selected{% endif %}>{{ unidad.identificador }}</option>
                        {% endfor %}
                    </select>
                </div>

                <label for="observaciones_visita">Observaciones de la visita</label>
                <textarea id="observaciones_visita" name="observaciones_visita">{{ visita.observaciones_visita or '' }}</textarea>

                <button class="boton" type="submit">Guardar cambios</button>
            </form>
        </div>
    </div>

    <nav class="top-nav" aria-label="Navegación principal">
        <a class="top-nav-item" href="/">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 10.5 12 3l9 7.5"></path>
                <path d="M5 9.5V21h14V9.5"></path>
            </svg>
            <span class="top-nav-label">Inicio</span>
        </a>
        <a class="top-nav-item active" href="/expedientes">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 7.5A2.5 2.5 0 0 1 5.5 5H10l2 2h6.5A2.5 2.5 0 0 1 21 9.5v7A2.5 2.5 0 0 1 18.5 19h-13A2.5 2.5 0 0 1 3 16.5z"></path>
            </svg>
            <span class="top-nav-label">Expedientes</span>
        </a>
        <a class="top-nav-item center" href="/nuevo-expediente" aria-label="Nuevo expediente">
            <span class="top-nav-plus">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 5v14"></path>
                    <path d="M5 12h14"></path>
                </svg>
            </span>
            <span class="top-nav-label">Nuevo</span>
        </a>
        <a class="top-nav-item" href="/biblioteca-patologias">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5.5 4.5h10A2.5 2.5 0 0 1 18 7v12H7a2 2 0 0 0-2 2"></path>
                <path d="M5.5 4.5A2.5 2.5 0 0 0 3 7v12.5A1.5 1.5 0 0 0 4.5 21H18"></path>
            </svg>
            <span class="top-nav-label">Biblioteca</span>
        </a>
        <a class="top-nav-item" href="/logout">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M15.5 19a7.5 7.5 0 1 0-7 0"></path>
                <path d="M12 12a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"></path>
            </svg>
            <span class="top-nav-label">Perfil</span>
        </a>
    </nav>
    <script>
        const ambitoVisitaInput = document.getElementById("ambito_visita");
        const bloqueNivelVisita = document.getElementById("bloque_nivel_visita");
        const bloqueUnidadVisita = document.getElementById("bloque_unidad_visita");
        const bloqueZonaComunVisita = document.getElementById("bloque_zona_comun_visita");
        const bloqueExteriorVisita = document.getElementById("bloque_exterior_visita");
        const nivelIdVisita = document.getElementById("nivel_id_visita");
        const unidadIdVisita = document.getElementById("unidad_id_visita");
        const unidadIdZonaComunVisita = document.getElementById("unidad_id_zona_comun_visita");
        const unidadIdExteriorVisita = document.getElementById("unidad_id_exterior_visita");

        function actualizarAmbitoVisita() {
            const ambito = ambitoVisitaInput.value;
            bloqueNivelVisita.hidden = ambito !== "nivel";
            bloqueUnidadVisita.hidden = ambito !== "unidad";
            bloqueZonaComunVisita.hidden = ambito !== "zona_comun";
            bloqueExteriorVisita.hidden = ambito !== "exterior";

            if (ambito !== "nivel" && nivelIdVisita) {
                nivelIdVisita.value = "";
            }
            if (ambito !== "unidad" && unidadIdVisita) {
                unidadIdVisita.value = "";
            }
            if (ambito !== "zona_comun" && unidadIdZonaComunVisita) {
                unidadIdZonaComunVisita.value = "";
            }
            if (ambito !== "exterior" && unidadIdExteriorVisita) {
                unidadIdExteriorVisita.value = "";
            }
        }

        function sincronizarUnidadAmbitoAntesDeEnviar(event) {
            const form = event.currentTarget;
            const ambito = ambitoVisitaInput.value;
            unidadIdVisita.name = ambito === "unidad" ? "unidad_id" : "unidad_id_descartado";
            unidadIdZonaComunVisita.name = ambito === "zona_comun" ? "unidad_id" : "unidad_id_zona_comun";
            unidadIdExteriorVisita.name = ambito === "exterior" ? "unidad_id" : "unidad_id_exterior";
        }

        if (ambitoVisitaInput) {
            ambitoVisitaInput.addEventListener("change", actualizarAmbitoVisita);
            actualizarAmbitoVisita();
        }

        const formulario = document.querySelector("form");
        if (formulario) {
            formulario.addEventListener("submit", sincronizarUnidadAmbitoAntesDeEnviar);
        }
    </script>
</body>

</html>
