<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <link rel="stylesheet" href="/static/mobile.css?v=8">
    <title>{{ titulo }}</title>
</head>
<body>
    {% include "partials/_app_shell_start.html" %}
<div class="page">
<div class="card">
            <h1>{{ titulo }}</h1>
            <p class="subtitle">Lead básico con soporte de seguimiento comercial y próximas acciones.</p>
            {% if error %}<p class="error">{{ error }}</p>{% endif %}

            <form method="post" action="{{ form_action }}">
                <label for="nombre">Nombre</label>
                <input id="nombre" name="nombre" type="text" value="{{ lead.nombre or '' }}" required>

                <label for="email">Email</label>
                <input id="email" name="email" type="email" value="{{ lead.email or '' }}">

                <label for="telefono">Teléfono</label>
                <input id="telefono" name="telefono" type="text" value="{{ lead.telefono or '' }}">

                <label for="origen">Origen</label>
                <input id="origen" name="origen" type="text" value="{{ lead.origen or '' }}">

                <label for="servicio_solicitado">Servicio solicitado</label>
                <input id="servicio_solicitado" name="servicio_solicitado" type="text" value="{{ lead.servicio_solicitado or '' }}">

                <label for="estado">Estado</label>
                <select id="estado" name="estado">
                    {% for estado in estados_lead %}
                    <option value="{{ estado }}" {% if (lead.estado or 'nuevo') == estado %}selected{% endif %}>{{ estado.replace('_', ' ') }}</option>
                    {% endfor %}
                </select>

                <label for="prioridad">Prioridad</label>
                <input id="prioridad" name="prioridad" type="text" value="{{ lead.prioridad or '' }}">

                <label for="mensaje">Mensaje</label>
                <textarea id="mensaje" name="mensaje">{{ lead.mensaje or '' }}</textarea>

                <label for="notas">Notas internas</label>
                <textarea id="notas" name="notas">{{ lead.notas or '' }}</textarea>

                <div class="actions">
                    <button class="boton" type="submit">{{ submit_label }}</button>
                    <a class="boton secundario" href="/leads">Volver a leads</a>
                </div>
            </form>
        </div>
    </div>
    {% include "partials/_app_shell_end.html" %}
</body>
</html>
