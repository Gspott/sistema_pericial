<!DOCTYPE html>
<html lang="es">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/mobile.css">
    <title>Nueva visita</title>
</head>

<body>
    <div class="page">
        <h1>Nueva visita</h1>

        <div class="card">
            <p><strong>Expediente:</strong> {{ expediente.numero_expediente }}</p>
            <p><strong>Dirección:</strong> {{ expediente.direccion }}</p>
            <p>Al guardar esta visita, se copiarán automáticamente las estancias de la última visita existente del
                expediente, si las hubiera.</p>
        </div>

        <form method="post" action="/guardar-visita/{{ expediente.id }}">
            <div class="card">
                <label>Fecha de visita</label>
                <input type="date" name="fecha" required>

                <label>Técnico</label>
                <input name="tecnico" required>

                <label>Observaciones de visita</label>
                <textarea name="observaciones_visita" rows="5"></textarea>

                <button type="submit">Guardar visita</button>
            </div>
        </form>

        <div class="actions">
            <a class="boton secundario" href="/detalle-expediente/{{ expediente.id }}">Volver al expediente</a>
        </div>
    </div>
</body>

</html>
