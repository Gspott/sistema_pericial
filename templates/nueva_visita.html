<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="/static/mobile.css?v=3">
    <script src="/static/pwa.js?v=4" defer></script>

    <title>Nueva visita</title>
</head>

<body>
    <div class="page">
        <h1>Nueva visita</h1>

        <div class="actions">
            <a class="boton secundario" href="/detalle-expediente/{{ expediente.id }}">Volver al expediente</a>
        </div>

        <div class="card">
            <p><strong>Expediente:</strong> {{ expediente.numero_expediente }}</p>
            <p><strong>Cliente:</strong> {{ expediente.cliente }}</p>
            <p><strong>Dirección:</strong> {{ expediente.direccion }}</p>
        </div>

        <div class="card">
            <form method="post" action="/guardar-visita/{{ expediente.id }}">
                <label for="fecha">Fecha</label>
                <input type="date" id="fecha" name="fecha" required>

                <label for="tecnico">Técnico</label>
                <input type="text" id="tecnico" name="tecnico" required>

                <label for="observaciones_visita">Observaciones de la visita</label>
                <textarea id="observaciones_visita" name="observaciones_visita"></textarea>

                <button class="boton" type="submit">Guardar visita</button>
            </form>
        </div>
    </div>
</body>

</html>
