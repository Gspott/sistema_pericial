<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/static/mobile.css?v=3">
    <script src="/static/pwa.js?v=3" defer></script>

    <title>Nuevo expediente</title>
</head>

<body>
    <div class="page">
        <h1>Nuevo expediente</h1>

        <div class="actions">
            <a class="boton secundario" href="/">Volver al inicio</a>
            <a class="boton secundario" href="/expedientes">Ver expedientes</a>
        </div>

        <div class="card">
            <form method="post" action="/guardar-expediente">
                <label for="numero_expediente">Número de expediente</label>
                <input type="text" id="numero_expediente" name="numero_expediente" required>

                <label for="cliente">Cliente</label>
                <input type="text" id="cliente" name="cliente" required>

                <label for="direccion">Dirección</label>
                <input type="text" id="direccion" name="direccion" required>

                <label for="tipo_inmueble">Tipo de inmueble</label>
                <select id="tipo_inmueble" name="tipo_inmueble">
                    <option value="">Seleccionar...</option>
                    <option value="Vivienda unifamiliar">Vivienda unifamiliar</option>
                    <option value="Piso">Piso</option>
                    <option value="Local">Local</option>
                    <option value="Oficina">Oficina</option>
                    <option value="Nave">Nave</option>
                    <option value="Garaje">Garaje</option>
                    <option value="Trastero">Trastero</option>
                    <option value="Otro">Otro</option>
                </select>

                <button class="boton" type="submit">Guardar expediente</button>
            </form>
        </div>
    </div>
</body>

</html>
